# Termi - Docker Compose Stack (Dokploy Compatible)
# Database is managed externally — provide DATABASE_URL via environment/env file
# Routing is handled by Traefik (Dokploy built-in)

services:

  # ==========================================================================
  # Redis for Session Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: termo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - termo-network

  # ==========================================================================
  # Guacd - Apache Guacamole Daemon
  # Provides RDP and VNC proxy functionality
  # ==========================================================================
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: termo-guacd
    restart: unless-stopped
    networks:
      - termo-network

  # ==========================================================================
  # Termi Web Application (Next.js)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: termo-web
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      # Session & Encryption
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-string}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-with-openssl-rand-base64-32}

      # Gateway
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}
      NEXT_PUBLIC_GATEWAY_URL: ${GATEWAY_URL:-wss://gateway.example.com}

      # Other
      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.termi-web-http.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.termi-web-http.entrypoints=web"
      - "traefik.http.routers.termi-web-http.middlewares=redirect-to-https"
      # HTTPS
      - "traefik.http.routers.termi-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.termi-web.entrypoints=websecure"
      - "traefik.http.routers.termi-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.termi-web.loadbalancer.server.port=3000"
      # Shared redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - termo-network
      - dokploy-network

  # ==========================================================================
  # Termi Gateway (WebSocket Proxy)
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: termo-gateway
    restart: unless-stopped
    depends_on:
      - guacd
    environment:
      # Gateway Settings
      GATEWAY_PORT: 8080
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}

      # Guacd Connection
      GUACD_HOST: guacd
      GUACD_PORT: 4822

      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.termi-gateway-http.rule=Host(`${GATEWAY_DOMAIN}`)"
      - "traefik.http.routers.termi-gateway-http.entrypoints=web"
      - "traefik.http.routers.termi-gateway-http.middlewares=redirect-to-https"
      # HTTPS + WebSocket
      - "traefik.http.routers.termi-gateway.rule=Host(`${GATEWAY_DOMAIN}`)"
      - "traefik.http.routers.termi-gateway.entrypoints=websecure"
      - "traefik.http.routers.termi-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.termi-gateway.loadbalancer.server.port=8080"
    networks:
      - termo-network
      - dokploy-network

networks:
  termo-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  redis_data:
