# Termo - Complete Docker Compose Stack
# This file defines all services needed to run Termo

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: termo-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: termo
      POSTGRES_USER: ${POSTGRES_USER:-termo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-termo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - termo-network

  # ==========================================================================
  # Redis for Session Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: termo-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - termo-network

  # ==========================================================================
  # Guacd - Apache Guacamole Daemon
  # Provides RDP and VNC proxy functionality
  # ==========================================================================
  guacd:
    image: guacamole/guacd:1.5.4
    container_name: termo-guacd
    restart: unless-stopped
    networks:
      - termo-network

  # ==========================================================================
  # Termo Web Application (Next.js)
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: termo-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-termo}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/termo?schema=public
      
      # Session & Encryption
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-string}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-with-openssl-rand-base64-32}
      
      # Gateway
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}
      NEXT_PUBLIC_GATEWAY_URL: ${GATEWAY_URL:-ws://localhost:8080}
      
      # Other
      NODE_ENV: production
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - termo-network

  # ==========================================================================
  # Termo Gateway (WebSocket Proxy)
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    container_name: termo-gateway
    restart: unless-stopped
    depends_on:
      - guacd
    environment:
      # Gateway Settings
      GATEWAY_PORT: 8080
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}
      
      # Guacd Connection
      GUACD_HOST: guacd
      GUACD_PORT: 4822
      
      NODE_ENV: production
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    networks:
      - termo-network

  # ==========================================================================
  # Nginx Reverse Proxy (Optional - uncomment to use)
  # ==========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: termo-nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - web
  #     - gateway
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   networks:
  #     - termo-network

networks:
  termo-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
