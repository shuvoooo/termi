services:
  guacd:
    image: guacamole/guacd:1.5.5
    container_name: termi-guacd
    restart: unless-stopped
    networks:
      - dokploy-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        SESSION_SECRET: ${SESSION_SECRET:-build-time-placeholder-not-used-in-runtime-x}
        ENCRYPTION_KEY: ${ENCRYPTION_KEY:-build-time-placeholder-not-used-in-runtime-x}
        GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-build-time-placeholder-not-used-in-runtime}
    container_name: termi-web
    restart: unless-stopped
    environment:
      # Database — set DATABASE_URL in your .env to point at your external database
      DATABASE_URL: ${DATABASE_URL}

      # Session & Encryption
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-string}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-generate-with-openssl-rand-base64-32}

      # Gateway
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-wss://gateway.example.com}

      # App URL
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://example.com}

      # Email (SMTP) — optional, logs to console if not set
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}

      # Security
      ALLOW_PRIVATE_NETWORKS: ${ALLOW_PRIVATE_NETWORKS:-false}

      # Other
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.termi-web-http.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.termi-web-http.entrypoints=web"
      - "traefik.http.routers.termi-web-http.middlewares=redirect-to-https"
      # HTTPS
      - "traefik.http.routers.termi-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.termi-web.entrypoints=websecure"
      - "traefik.http.routers.termi-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.termi-web.loadbalancer.server.port=3000"
      # Shared redirect middleware
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
    networks:
      - dokploy-network

  # ==========================================================================
  # Termi Gateway (WebSocket Proxy)
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    container_name: termi-gateway
    restart: unless-stopped
    depends_on:
      - guacd
    environment:
      # Gateway Settings
      GATEWAY_PORT: 8080
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-gateway-secret-change-this}

      # Guacd Connection
      GUACD_HOST: guacd
      GUACD_PORT: 4822

      NODE_ENV: production
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.termi-gateway-http.rule=Host(`${GATEWAY_DOMAIN}`)"
      - "traefik.http.routers.termi-gateway-http.entrypoints=web"
      - "traefik.http.routers.termi-gateway-http.middlewares=redirect-to-https"
      # HTTPS + WebSocket
      - "traefik.http.routers.termi-gateway.rule=Host(`${GATEWAY_DOMAIN}`)"
      - "traefik.http.routers.termi-gateway.entrypoints=websecure"
      - "traefik.http.routers.termi-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.termi-gateway.loadbalancer.server.port=8080"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true